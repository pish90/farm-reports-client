<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farm Reports</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f4f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      width: 72px;
      height: 72px;
      background: #2d6a4f;
      border-radius: 18px;
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.4rem;
    }

    p {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.9rem 1rem;
      background: #2d6a4f;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: #235c41; }

    .note {
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: #999;
      line-height: 1.5;
    }

    #status {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #2d6a4f;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🌿</div>
    <h1>Farm Reports</h1>
    <p>Tap the button below to open the app. Make sure Expo Go is installed on your device.</p>

    <a class="btn" id="openBtn" href="exp://u.expo.dev/bdb6a038-448e-4bd1-977a-b5da6a662739?channel-name=preview">
      Open Farm Reports
    </a>

    <div id="status"></div>

    <p class="note">
      Don't have Expo Go?
      <a href="https://apps.apple.com/app/expo-go/id982107779" style="color:#2d6a4f;">Download for iPhone</a>
      &nbsp;·&nbsp;
      <a href="https://play.google.com/store/apps/details?id=host.exp.exponent" style="color:#2d6a4f;">Download for Android</a>
    </p>
  </div>

  <script>
    document.getElementById('openBtn').addEventListener('click', function(e) {
      e.preventDefault();
      var url = 'exp://u.expo.dev/bdb6a038-448e-4bd1-977a-b5da6a662739?channel-name=preview';
      document.getElementById('status').textContent = 'Opening app…';
      window.location.href = url;

      // If still here after 2.5s, Expo Go probably isn't installed
      setTimeout(function() {
        document.getElementById('status').textContent =
          'App did not open — make sure Expo Go is installed.';
      }, 2500);
    });
  </script>
</body>
</html>
